---
name: CI
permissions: {}

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for release-setup action
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Release
        id: release-setup
        uses: LizardByte/actions/actions/release_setup@200eaeb897a2b065a65cb6f16b41077432007490  # v2026.605.34721
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create/Update GitHub Release
        if: steps.release-setup.outputs.publish_release == 'true'
        uses: LizardByte/actions/actions/release_create@200eaeb897a2b065a65cb6f16b41077432007490  # v2026.605.34721
        with:
          allowUpdates: false
          artifacts: ''
          body: ${{ steps.release-setup.outputs.release_body }}
          draft: true
          generateReleaseNotes: ${{ steps.release-setup.outputs.release_generate_release_notes }}
          name: ${{ steps.release-setup.outputs.release_tag }}
          prerelease: true
          tag: ${{ steps.release-setup.outputs.release_tag }}
          token: ${{ secrets.GH_BOT_TOKEN }}
